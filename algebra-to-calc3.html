<script>
var e=React.createElement,useState=React.useState,useEffect=React.useEffect,useRef=React.useRef;
var COURSES=[{id:"alg1",title:"Algebra I",sub:"Foundations",color:"#e07a2f",icon:"x",desc:"Variables, equations, functions вҖ” the language of math",lessons:[{title:"Linear Equations & Inequalities",sections:[{h:"Solving Linear Equations",body:"A linear equation has the variable to the first power. Goal: isolate x.\n\nUse inverse operations вҖ” undo what's done to x:\n  3x + 7 = 22\n  3x = 15        (subtract 7 from both sides)\n  x = 5          (divide both sides by 3)\n\nGolden rule: whatever you do to one side, you MUST do to the other.\n\nVariables on both sides вҖ” collect them:\n  5x вҲ’ 3 = 2x + 9\n  3x вҲ’ 3 = 9       (subtract 2x)\n  3x = 12          (add 3)\n  x = 4\n\nDistributive property first:\n  2(3x вҲ’ 1) вҲ’ 4 = 3(x + 2)\n  6x вҲ’ 2 вҲ’ 4 = 3x + 6\n  6x вҲ’ 6 = 3x + 6\n  3x = 12 вҶ’ x = 4\n\nAlways verify by plugging your answer back into the ORIGINAL equation."},{h:"Inequalities",body:"Same process as equations with ONE crucial exception:\n\nвҡ пёҸ Multiplying or dividing by a NEGATIVE flips the inequality.\n\n  вҲ’2x > 6\n  x < вҲ’3     (divided by вҲ’2, flipped > to <)\n\nCompound inequalities:\n  вҲ’1 < 2x + 3 вүӨ 9\n  вҲ’4 < 2x вүӨ 6\n  вҲ’2 < x вүӨ 3\n\nInterval notation: (вҲ’2, 3]\n  ( ) = not included, [ ] = included"},{h:"Absolute Value Equations",body:"|x| = distance from x to 0. Always вүҘ 0.\n\n|expression| = k (k > 0):\n  expression = k  OR  expression = вҲ’k\n\nExample: |2x вҲ’ 3| = 7\n  2x вҲ’ 3 = 7  вҶ’  x = 5\n  2x вҲ’ 3 = вҲ’7 вҶ’  x = вҲ’2\n\nInequalities:\n  |x| < 3  вҶ’  вҲ’3 < x < 3  (between)\n  |x| > 3  вҶ’  x < вҲ’3 OR x > 3  (outside)"}],problems:[{q:"Solve: 4(x вҲ’ 3) + 2 = 3x + 5",a:"15",sol:"4xвҲ’12+2=3x+5 вҶ’ 4xвҲ’10=3x+5 вҶ’ x=15.",h:"Distribute, combine."},{q:"Solve: вҲ’3x + 7 > 19",a:"x < -4",sol:"вҲ’3x > 12 вҶ’ x < вҲ’4.",h:"Flip when dividing by negative."},{q:"Solve: |3x вҲ’ 6| = 12",a:"6 and -2",sol:"3xвҲ’6=12вҶ’x=6. 3xвҲ’6=вҲ’12вҶ’x=вҲ’2.",h:"Two cases."},{q:"Sum of three consecutive integers is 72. Largest?",a:"25",sol:"n+(n+1)+(n+2)=72 вҶ’ n=23. Largest=25.",h:"Let them be n, n+1, n+2."}]},{title:"Quadratic Equations",sections:[{h:"Factoring Method",body:"axВІ + bx + c = 0. Factor, then zero product property.\n\nxВІ вҲ’ 5x + 6 = 0 вҶ’ (xвҲ’2)(xвҲ’3) = 0 вҶ’ x = 2 or 3\n\nDifference of squares: xВІвҲ’16 = (xвҲ’4)(x+4) = 0 вҶ’ x = Вұ4"},{h:"Quadratic Formula",body:"x = (вҲ’b Вұ вҲҡ(bВІвҲ’4ac)) / 2a\n\nDiscriminant О” = bВІвҲ’4ac:\n  О” > 0: two real solutions\n  О” = 0: one repeated solution\n  О” < 0: no real solutions\n\n2xВІвҲ’3xвҲ’5=0: О”=9+40=49\n  x = (3Вұ7)/4 вҶ’ x=5/2 or x=вҲ’1"},{h:"Completing the Square",body:"xВІ + 6x + 2 = 0\n  xВІ + 6x = вҲ’2\n  xВІ + 6x + 9 = 7\n  (x+3)ВІ = 7\n  x = вҲ’3 Вұ вҲҡ7\n\nVertex: x = вҲ’b/(2a), then plug back in."}],problems:[{q:"Solve: xВІ вҲ’ 9x + 20 = 0",a:"4 and 5",sol:"(xвҲ’4)(xвҲ’5)=0.",h:"Multiply to 20, add to 9."},{q:"Quadratic formula: 2xВІ+xвҲ’6=0. Positive root?",a:"3/2",sol:"(вҲ’1+7)/4=3/2.",h:"a=2, b=1, c=вҲ’6."},{q:"Vertex of y=xВІвҲ’4x+7?",a:"(2, 3)",sol:"x=4/2=2. y=4вҲ’8+7=3.",h:"x=вҲ’b/(2a)."},{q:"Real solutions of 3xВІвҲ’2x+5=0?",a:"0",sol:"О”=4вҲ’60=вҲ’56<0.",h:"Check discriminant."}]},{title:"Polynomials & Factoring",sections:[{h:"Operations",body:"Multiply: (2x+3)(xвҲ’4) = 2xВІвҲ’5xвҲ’12\n\nSpecial products:\n  (a+b)ВІ = aВІ+2ab+bВІ\n  (aвҲ’b)ВІ = aВІвҲ’2ab+bВІ\n  (a+b)(aвҲ’b) = aВІвҲ’bВІ"},{h:"Factoring Techniques",body:"1. GCF: 6xВІ+9x = 3x(2x+3)\n2. Diff of squares: xВІвҲ’49 = (xвҲ’7)(x+7)\n3. Trinomial: xВІ+7x+12 = (x+3)(x+4)\n4. AC method: 2xВІ+7x+3 = (2x+1)(x+3)\n5. Cubes: aВі+bВі = (a+b)(aВІвҲ’ab+bВІ)\n   SOAP: Same, Opposite, Always Positive"},{h:"Polynomial Division",body:"Synthetic division (Г· by xвҲ’c):\n  (2xВівҲ’5xВІ+3xвҲ’7) Г· (xвҲ’2)\n  Result: 2xВІвҲ’x+1, remainder вҲ’5\n\nRemainder Theorem: f(c) = remainder\nFactor Theorem: (xвҲ’c) is factor iff f(c)=0"}],problems:[{q:"Factor: 2xВівҲ’18x",a:"2x(x-3)(x+3)",sol:"2x(xВІвҲ’9) = 2x(xвҲ’3)(x+3).",h:"GCF then diff of squares."},{q:"Factor: 3xВІ+11x+6",a:"(3x+2)(x+3)",sol:"AC=18. Split middle.",h:"AC method."},{q:"Factor: xВі+8",a:"(x+2)(xВІ-2x+4)",sol:"Sum of cubes.",h:"aВі+bВі formula."}]},{title:"Systems of Equations",sections:[{h:"Substitution",body:"Solve one for a variable, plug into other.\n  y=2x+1, 3x+y=11\n  3x+(2x+1)=11 вҶ’ x=2, y=5"},{h:"Elimination",body:"Add/subtract to kill a variable.\n  2x+3y=12\n  4xвҲ’3y=6\n  Add: 6x=18 вҶ’ x=3, y=2"}],problems:[{q:"x+y=10, xвҲ’y=4. Find x.",a:"7",sol:"Add: 2x=14вҶ’x=7.",h:"Add equations."},{q:"2x+3y=1, 4xвҲ’y=9. Find y.",a:"-1",sol:"y=4xвҲ’9. Sub: 14x=28вҶ’x=2,y=вҲ’1.",h:"Substitution."},{q:"y=xВІ, y=x+2. Positive x?",a:"2",sol:"xВІ=x+2вҶ’(xвҲ’2)(x+1)=0.",h:"Set equal."}]},{title:"Radicals & Rationals",sections:[{h:"Radicals",body:"вҲҡ(ab)=вҲҡaВ·вҲҡb, вҲҡ(aВІ)=|a|\n\nSimplify: вҲҡ50=5вҲҡ2\nRationalize: 1/вҲҡ3=вҲҡ3/3\nConjugate: 1/(вҲҡ5вҲ’вҲҡ2)=(вҲҡ5+вҲҡ2)/3"},{h:"Rational Expressions",body:"Factor and cancel:\n  (xВІвҲ’4)/(xВІвҲ’4x+4) = (x+2)/(xвҲ’2)\n\nAdd: find LCD.\nSolve: multiply by LCD. CHECK for extraneous solutions!"}],problems:[{q:"Simplify: вҲҡ(200)",a:"10вҲҡ2",sol:"вҲҡ(100В·2)=10вҲҡ2.",h:"Largest perfect square."},{q:"Rationalize: 6/вҲҡ3",a:"2вҲҡ3",sol:"6вҲҡ3/3=2вҲҡ3.",h:"Multiply by вҲҡ3/вҲҡ3."},{q:"Simplify: (xВІвҲ’9)/(xВІ+5x+6)",a:"(x-3)/(x+2)",sol:"(xвҲ’3)(x+3)/((x+2)(x+3)).",h:"Factor both."}]}]},{id:"alg2",title:"Algebra II",sub:"& Precalculus",color:"#8338ec",icon:"f(x)",desc:"Functions, logs, complex numbers",lessons:[{title:"Functions Deep Dive",sections:[{h:"Fundamentals",body:"Function: ONE output per input.\nDomain: valid inputs (denomвү 0, radicandвүҘ0, log arg>0)\nRange: possible outputs."},{h:"Composition & Inverses",body:"(fвҲҳg)(x)=f(g(x)). Order matters!\n\nInverse: swap x,y and solve.\n  f(x)=(2x+3)/5 вҶ’ fвҒ»В№(x)=(5xвҲ’3)/2\n\nVerify: f(fвҒ»В№(x))=x."},{h:"Transformations",body:"y=f(x)+k: up k.  y=f(xвҲ’h): right h.\ny=af(x): stretch |a|.  y=вҲ’f(x): flip x-axis.\n\ny=вҲ’2f(xвҲ’3)+1: right 3, stretch 2, flip, up 1."}],problems:[{q:"f(x)=xВІвҲ’1. f(f(2))=?",a:"8",sol:"f(2)=3, f(3)=8.",h:"Inside-out."},{q:"f(x)=3x+2. fвҒ»В№(x)=?",a:"(x-2)/3",sol:"Swap and solve.",h:"y=3x+2вҶ’x=(yвҲ’2)/3."},{q:"Domain of вҲҡ(5вҲ’2x)?",a:"x вүӨ 5/2",sol:"5вҲ’2xвүҘ0.",h:"Radicand вүҘ 0."}]},{title:"Exponentials & Logarithms",sections:[{h:"Exponentials",body:"aЛЈ rules: aвҒ°=1, aЛЈaКё=aЛЈвҒәКё, (aЛЈ)Кё=aЛЈКё\n\neвүҲ2.718: eЛЈ is its own derivative.\nGrowth: A=PeКібө—. Decay: A=PeвҒ»бөҸбө—."},{h:"Logarithms",body:"log_a(x)=y means aКё=x.\n\nLaws: log(AB)=logA+logB\n  log(A/B)=logAвҲ’logB\n  log(AвҒҝ)=nlogA\n\nChange of base: log_a(x)=ln(x)/ln(a)"},{h:"Solving Equations",body:"ExponentialвҶ’take log.\n  5^(2x+1)=125вҶ’2x+1=3вҶ’x=1\n\nLogвҶ’exponential.\n  logвӮӮ(xвҲ’1)=5вҶ’x=33\n\nвҡ пёҸ Check log arguments > 0!"}],problems:[{q:"2ЛЈ=64. x=?",a:"6",sol:"2вҒ¶=64.",h:"64 as power of 2."},{q:"logвӮғ(27)+logвӮғ(9)=?",a:"5",sol:"3+2=5.",h:"27=3Ві, 9=3ВІ."},{q:"logвӮӮ(x)+logвӮӮ(x+6)=4",a:"2",sol:"xВІ+6x=16вҶ’x=2.",h:"Combine, convert."},{q:"e^(2x)=7. x=?",a:"ln(7)/2",sol:"2x=ln7.",h:"Take ln."}]},{title:"Complex Numbers & Polynomials",sections:[{h:"Complex Numbers",body:"i=вҲҡ(вҲ’1), iВІ=вҲ’1.\n(3+2i)(1вҲ’4i)=3вҲ’12i+2iвҲ’8iВІ=11вҲ’10i\n\ni powers cycle: i,вҲ’1,вҲ’i,1,вҖҰ\niвҒҙвҒ·: 47mod4=3вҶ’iВі=вҲ’i"},{h:"Polynomial Theorems",body:"Degree n вҶ’ n roots (counting complex+multiplicity).\nComplex Conjugate Theorem: a+bi root вҶ’ aвҲ’bi root.\nRational Root: Вұ(factors of constant)/(factors of leading)."}],problems:[{q:"(2+3i)(4вҲ’i)=?",a:"11+10i",sol:"8вҲ’2i+12iвҲ’3iВІ=11+10i.",h:"FOIL, iВІ=вҲ’1."},{q:"iвҒҙвҒ·=?",a:"-i",sol:"47mod4=3, iВі=вҲ’i.",h:"Cycle of 4."}]},{title:"Sequences & Series",sections:[{h:"Arithmetic",body:"aвӮҷ=aвӮҒ+(nвҲ’1)d. SвӮҷ=n(aвӮҒ+aвӮҷ)/2.\n3,7,11,15(d=4): aвӮӮвӮҖ=79, SвӮӮвӮҖ=820."},{h:"Geometric",body:"aвӮҷ=aвӮҒrвҒҝвҒ»В№. SвӮҷ=aвӮҒ(1вҲ’rвҒҝ)/(1вҲ’r).\nSвҲһ=aвӮҒ/(1вҲ’r) if |r|<1.\n\n1+1/2+1/4+вҖҰ=2."}],problems:[{q:"aвӮҒ=5, d=3. aвӮ…вӮҖ=?",a:"152",sol:"5+49(3)=152.",h:"aвӮҷ=aвӮҒ+(nвҲ’1)d."},{q:"Geo a=4, r=3. SвӮҶ=?",a:"1456",sol:"4(728)/2=1456.",h:"Finite sum."},{q:"8+4+2+1+вҖҰ=?",a:"16",sol:"8/(1вҲ’1/2)=16.",h:"Infinite geo."},{q:"Sum 1 to 100?",a:"5050",sol:"100(101)/2.",h:"n(n+1)/2."}]}]},{id:"trig",title:"Trigonometry",sub:"Angles & Waves",color:"#2a9d8f",icon:"Оё",desc:"Connecting angles, ratios, and circular motion",lessons:[{title:"Trig Functions & Unit Circle",sections:[{h:"SOH-CAH-TOA",body:"sin=Opp/Hyp, cos=Adj/Hyp, tan=Opp/Adj\ncsc=1/sin, sec=1/cos, cot=1/tan\n\n45-45-90: legs=1, hyp=вҲҡ2\n30-60-90: 1, вҲҡ3, 2"},{h:"Unit Circle",body:"Point at angle Оё = (cosОё, sinОё)\n\n  0В°: sin=0, cos=1\n  30В°: sin=1/2, cos=вҲҡ3/2\n  45В°: sin=вҲҡ2/2, cos=вҲҡ2/2\n  60В°: sin=вҲҡ3/2, cos=1/2\n  90В°: sin=1, cos=0\n\nAll Students Take Calculus:\n  Q1:all+ Q2:sin+ Q3:tan+ Q4:cos+"},{h:"Identities",body:"sinВІОё+cosВІОё=1\n1+tanВІОё=secВІОё\n\nDouble: sin2Оё=2sinОёcosОё\n  cos2Оё=cosВІОёвҲ’sinВІОё\n\nSum: sin(AВұB)=sinAcosBВұcosAsinB\n     cos(AВұB)=cosAcosBвҲ“sinAsinB"}],problems:[{q:"sin(5ПҖ/6)=?",a:"1/2",sol:"Ref ПҖ/6 in Q2, sin+.",h:"Q2, ref angle."},{q:"sinОё=3/5 Q1. cosОё=?",a:"4/5",sol:"cosВІ=16/25вҶ’4/5.",h:"sinВІ+cosВІ=1."},{q:"(1вҲ’cosВІx)/sinx=?",a:"sin x",sol:"sinВІx/sinx.",h:"1вҲ’cosВІ=sinВІ."},{q:"cos(75В°) exact?",a:"(вҲҡ6-вҲҡ2)/4",sol:"cos(45+30) formula.",h:"Sum formula."}]},{title:"Graphing & Inverse Trig",sections:[{h:"Graphing",body:"y=Asin(BxвҲ’C)+D\n|A|=amplitude, Period=2ПҖ/|B|\nPhase=C/B, Midline=D"},{h:"Inverse Trig",body:"arcsin: [вҲ’1,1]вҶ’[вҲ’ПҖ/2,ПҖ/2]\narccos: [вҲ’1,1]вҶ’[0,ПҖ]\narctan: в„қвҶ’(вҲ’ПҖ/2,ПҖ/2)\n\nsinвҒ»В№(1/2)=ПҖ/6, tanвҒ»В№(1)=ПҖ/4"}],problems:[{q:"Period of sin(3x)?",a:"2ПҖ/3",sol:"2ПҖ/3.",h:"2ПҖ/B."},{q:"arctan(вҲҡ3)=?",a:"ПҖ/3",sol:"tan(ПҖ/3)=вҲҡ3.",h:"Which angle?"}]},{title:"Solving Trig Equations",sections:[{h:"Basic",body:"sinx=1/2 in [0,2ПҖ): x=ПҖ/6, 5ПҖ/6\ncosx=вҲ’вҲҡ2/2: x=3ПҖ/4, 5ПҖ/4\ntanx=1: x=ПҖ/4+nПҖ"},{h:"Advanced",body:"Use identities first:\n  2sinВІxвҲ’sinxвҲ’1=0 вҶ’ let u=sinx\n  (2u+1)(uвҲ’1)=0\n\nвҡ пёҸ Never divide by trig function!"}],problems:[{q:"cos x=вҲ’1/2 in [0,2ПҖ)?",a:"2ПҖ/3 and 4ПҖ/3",sol:"Ref ПҖ/3, Q2+Q3.",h:"cos neg in Q2,Q3."},{q:"2sinВІx=1 in [0,2ПҖ)?",a:"ПҖ/4, 3ПҖ/4, 5ПҖ/4, 7ПҖ/4",sol:"sinx=ВұвҲҡ2/2.",h:"Isolate sinВІx."}]},{title:"Law of Sines & Cosines",sections:[{h:"Law of Sines",body:"a/sinA = b/sinB = c/sinC = 2R\nUse for AAS, ASA, SSA."},{h:"Law of Cosines",body:"cВІ=aВІ+bВІвҲ’2abВ·cosC\nUse for SAS, SSS.\ncosC=(aВІ+bВІвҲ’cВІ)/(2ab)"}],problems:[{q:"A=30В°, a=5, b=8. sinB=?",a:"4/5",sol:"sinB=8sin30В°/5=4/5.",h:"Law of Sines."},{q:"Sides 3,4,5. Angle opp 5?",a:"90В°",sol:"cosC=0вҶ’90В°.",h:"Law of Cosines."}]}]},{id:"calc1",title:"Calculus I",sub:"Limits & Derivatives",color:"#c25454",icon:"f'",desc:"The mathematics of change and motion",lessons:[{title:"Limits",sections:[{h:"What is a Limit?",body:"lim[xвҶ’a]f(x)=L: as xвҶ’a, f(x)вҶ’L.\n\nStrategy: 1)plug in 2)if 0/0: factor 3)rationalize 4)L'HГҙpital\n\nlim[xвҶ’3](xВІвҲ’9)/(xвҲ’3) = x+3 вҶ’ 6"},{h:"Special Limits & Continuity",body:"lim[xвҶ’0]sinx/x=1\nlim[xвҶ’0](eЛЈвҲ’1)/x=1\nlim[nвҶ’вҲһ](1+1/n)вҒҝ=e\n\nLimits at вҲһ: divide by highest power.\n  (3xВІ+1)/(5xВІвҲ’2)вҶ’3/5\n\nContinuity: f(a) exists, lim exists, they're equal."}],problems:[{q:"lim[xвҶ’2](xВІвҲ’4)/(xвҲ’2)=?",a:"4",sol:"(x+2)вҶ’4.",h:"Factor."},{q:"lim[xвҶ’вҲһ](5xВівҲ’2x)/(3xВі+1)=?",a:"5/3",sol:"Г·xВівҶ’5/3.",h:"Highest power."},{q:"lim[xвҶ’0]sin(5x)/x=?",a:"5",sol:"5В·sin(5x)/(5x)вҶ’5.",h:"Rewrite."},{q:"lim[xвҶ’0](eЛЈвҲ’1)/(2x)=?",a:"1/2",sol:"ВҪВ·(eЛЈвҲ’1)/xвҶ’ВҪ.",h:"Special limit."}]},{title:"Derivative Rules",sections:[{h:"Power Rule & Basics",body:"d/dx[xвҒҝ]=nxвҒҝвҒ»В№\nd/dx[eЛЈ]=eЛЈ, d/dx[lnx]=1/x\nd/dx[sinx]=cosx, d/dx[cosx]=вҲ’sinx\nd/dx[tanx]=secВІx"},{h:"Product, Quotient, Chain",body:"Product: (fg)'=f'g+fg'\nQuotient: (f/g)'=(f'gвҲ’fg')/gВІ\nChain: [f(g(x))]'=f'(g(x))В·g'(x)\n\n  d/dx[sin(3x)]=3cos(3x)\n  d/dx[(xВІ+1)вҒө]=10x(xВІ+1)вҒҙ\n  d/dx[e^(xВІ)]=2xe^(xВІ)"},{h:"Implicit & Logarithmic",body:"Implicit: diff both sides w.r.t. x.\n  xВІ+yВІ=25вҶ’2x+2yy'=0вҶ’y'=вҲ’x/y\n\nLogarithmic: ln both sides first.\n  y=xЛЈвҶ’lny=xlnxвҶ’y'=xЛЈ(lnx+1)"}],problems:[{q:"d/dx[3xвҒҙвҲ’2xВІ+7]=?",a:"12xВі - 4x",sol:"Power rule.",h:"nxвҒҝвҒ»В№."},{q:"d/dx[xВІeЛЈ]=?",a:"eЛЈ(xВІ + 2x)",sol:"Product rule.",h:"f'g+fg'."},{q:"d/dx[sin(xВі)]=?",a:"3xВІcos(xВі)",sol:"Chain rule.",h:"Outside'Г—inside'."},{q:"d/dx[ln(xВІ+1)]=?",a:"2x/(xВІ+1)",sol:"Chain.",h:"(1/u)В·u'."},{q:"dy/dx if xВІ+yВІ=25 at (3,4)?",a:"-3/4",sol:"y'=вҲ’x/y=вҲ’3/4.",h:"Implicit."}]},{title:"Applications of Derivatives",sections:[{h:"Tangent Lines",body:"Tangent at x=a: yвҲ’f(a)=f'(a)(xвҲ’a)\n\nLinear approx: f(a+О”x)вүҲf(a)+f'(a)О”x\n  вҲҡ101вүҲ10+1/20=10.05"},{h:"Optimization",body:"1. f'(x)=0вҶ’critical pts\n2. f''>0вҶ’min, f''<0вҶ’max\n\nMax area rect, perimeter 20:\n  A=l(10вҲ’l), A'=10вҲ’2l=0вҶ’l=5, A=25."},{h:"Related Rates",body:"1. Equation relating quantities\n2. Differentiate w.r.t. t\n3. Plug in and solve\n\nLadder: xВІ+yВІ=25, dx/dt=2, x=3:\n  dy/dt=вҲ’3/2 ft/s"},{h:"L'HГҙpital's Rule",body:"0/0 or вҲһ/вҲһ: lim f/g = lim f'/g'\n\nlim[xвҶ’0]sinx/x = cosx/1 = 1\n\nCurve sketch: domainвҶ’interceptsвҶ’f'вҶ’f''вҶ’asymptotes."}],problems:[{q:"Tangent to xВІ at x=3. y-intercept?",a:"-9",sol:"y=6xвҲ’9.",h:"yвҲ’9=6(xвҲ’3)."},{q:"f(x)=xВівҲ’3x. Local max value?",a:"2",sol:"f'=0вҶ’x=Вұ1. f(вҲ’1)=2.",h:"f'=0, 2nd deriv."},{q:"lim[xвҶ’0](eЛЈвҲ’1вҲ’x)/xВІ via L'HГҙpital?",a:"1/2",sol:"Twice: eЛЈ/2вҶ’1/2.",h:"Apply twice."},{q:"Circle area grows 3cmВІ/s. dr/dt when r=2?",a:"3/(4ПҖ)",sol:"dA/dt=2ПҖrВ·dr/dt.",h:"Diff A=ПҖrВІ."}]}]},{id:"calc2",title:"Calculus II",sub:"Integration & Series",color:"#5a5aa0",icon:"вҲ«",desc:"Accumulation, area, volume, and infinite sums",lessons:[{title:"Integrals Fundamentals",sections:[{h:"Antiderivatives",body:"вҲ«xвҒҝdx=xвҒҝвҒәВ№/(n+1)+C [nвү вҲ’1]\nвҲ«1/xdx=ln|x|+C\nвҲ«eЛЈdx=eЛЈ+C\nвҲ«sinxdx=вҲ’cosx+C\nвҲ«cosxdx=sinx+C\nвҲ«secВІxdx=tanx+C\nвҲ«1/(1+xВІ)dx=arctanx+C"},{h:"Fundamental Theorem",body:"FTC1: d/dxвҲ«вӮҗЛЈf(t)dt=f(x)\nFTC2: вҲ«вӮҗбөҮf(x)dx=F(b)вҲ’F(a)\n\nвҲ«вӮҒВіxВІdx=[xВі/3]вӮҒВі=26/3"},{h:"Area Between Curves",body:"вҲ«вӮҗбөҮ[topвҲ’bottom]dx\n\ny=x and y=xВІ on [0,1]:\n  вҲ«вӮҖВ№(xвҲ’xВІ)dx=1/6"}],problems:[{q:"вҲ«(3xВІ+2x)dx=?",a:"xВі + xВІ + C",sol:"Reverse power rule.",h:"Each term."},{q:"вҲ«вӮҖВІ 4xdx=?",a:"8",sol:"[2xВІ]вӮҖВІ=8.",h:"Antideriv: 2xВІ."},{q:"вҲ«вӮҖПҖcosxdx=?",a:"0",sol:"[sinx]вӮҖПҖ=0.",h:"sin(ПҖ)=sin(0)=0."},{q:"Area y=x, y=xВІ on [0,1]?",a:"1/6",sol:"вҲ«(xвҲ’xВІ)dx=1/6.",h:"Top minus bottom."}]},{title:"Integration Techniques",sections:[{h:"u-Substitution",body:"вҲ«2xcos(xВІ)dx: u=xВІ, du=2xdx\n=вҲ«cosu du=sin(xВІ)+C\n\nвҲ«x/(xВІ+1)dx: u=xВІ+1\n=(1/2)ln(xВІ+1)+C"},{h:"Integration by Parts",body:"вҲ«udv=uvвҲ’вҲ«vdu\n\nLIATE for choosing u:\n  Log>InvTrig>Algebraic>Trig>Exp\n\nвҲ«xeЛЈdx=xeЛЈвҲ’eЛЈ+C\nвҲ«lnxdx=xlnxвҲ’x+C"},{h:"Trig Sub & Partial Fractions",body:"вҲҡ(aВІвҲ’xВІ): x=asinОё\nвҲҡ(aВІ+xВІ): x=atanОё\nвҲҡ(xВІвҲ’aВІ): x=asecОё\n\nPartial fractions:\n  1/(xВІвҲ’1)=1/(2(xвҲ’1))вҲ’1/(2(x+1))"}],problems:[{q:"вҲ«2xsin(xВІ)dx=?",a:"-cos(xВІ) + C",sol:"u=xВІвҶ’вҲ’cosu+C.",h:"u=xВІ."},{q:"вҲ«xcosxdx=?",a:"xВ·sin x + cos x + C",sol:"Parts: u=x, dv=cosxdx.",h:"By parts."},{q:"вҲ«вӮҖВ№xeЛЈdx=?",a:"1",sol:"[xeЛЈвҲ’eЛЈ]вӮҖВ№=1.",h:"Parts then evaluate."}]},{title:"Volumes & Improper Integrals",sections:[{h:"Volumes",body:"Disk: V=ПҖвҲ«[f(x)]ВІdx\nWasher: V=ПҖвҲ«[RВІвҲ’rВІ]dx\nShell: V=2ПҖвҲ«xf(x)dx\n\nRevolve y=вҲҡx [0,4] around x-axis:\n  V=ПҖвҲ«вӮҖвҒҙxdx=8ПҖ"},{h:"Improper Integrals",body:"вҲ«вӮҒвҲһ1/xВІdx=[вҲ’1/x]вӮҒвҲһ=1 (converges)\nвҲ«вӮҒвҲһ1/xdx=вҲһ (diverges)\n\np-test: вҲ«1/xбө– converges iff p>1."}],problems:[{q:"Volume y=xВІ [0,2] around x-axis?",a:"32ПҖ/5",sol:"ПҖвҲ«xвҒҙdx=32ПҖ/5.",h:"Disk method."},{q:"вҲ«вӮҒвҲһ1/xВіdx=?",a:"1/2",sol:"[вҲ’1/(2xВІ)]вӮҒвҲһ=1/2.",h:"p=3>1."}]},{title:"Infinite Series",sections:[{h:"Convergence Tests",body:"Divergence: limaвӮҷвү 0вҶ’diverges.\np-series: ОЈ1/nбө– converges if p>1.\nGeometric: |r|<1вҶ’a/(1вҲ’r).\nRatio: lim|aвӮҷвӮҠвӮҒ/aвӮҷ|<1вҶ’converges."},{h:"Taylor Series",body:"f(x)=ОЈfвҒҪвҒҝвҒҫ(a)/n!В·(xвҲ’a)вҒҝ\n\neЛЈ=1+x+xВІ/2!+вҖҰ\nsinx=xвҲ’xВі/3!+xвҒө/5!вҲ’вҖҰ\ncosx=1вҲ’xВІ/2!+xвҒҙ/4!вҲ’вҖҰ\n1/(1вҲ’x)=1+x+xВІ+вҖҰ [|x|<1]"}],problems:[{q:"ОЈ1/nВі: converge?",a:"converge",sol:"p=3>1.",h:"p-test."},{q:"ОЈ(1/3)вҒҝ=?",a:"3/2",sol:"1/(1вҲ’1/3)=3/2.",h:"Geometric."},{q:"Radius of ОЈxвҒҝ/n!?",a:"вҲһ",sol:"RatioвҶ’0.",h:"Ratio test."}]}]},{id:"calc3",title:"Calculus III",sub:"Multivariable",color:"#0096c7",icon:"вҲҮ",desc:"Calculus in 3D вҖ” surfaces, fields, fundamental theorems",lessons:[{title:"Vectors & 3D Geometry",sections:[{h:"Vectors",body:"v=вҹЁa,b,cвҹ©. |v|=вҲҡ(aВІ+bВІ+cВІ).\n\nDot: vВ·w=aвӮҒaвӮӮ+bвӮҒbвӮӮ+cвӮҒcвӮӮ=|v||w|cosОё\n  Scalar result. vВ·w=0вҶ”perpendicular.\n\nCross: vГ—w = vector вҠҘ both.\n  |vГ—w|=|v||w|sinОё. vГ—w=0вҶ”parallel."},{h:"Lines & Planes",body:"Line: r(t)=PвӮҖ+tv\nPlane normal n=вҹЁa,b,cвҹ© through PвӮҖ:\n  a(xвҲ’xвӮҖ)+b(yвҲ’yвӮҖ)+c(zвҲ’zвӮҖ)=0\n\nDist pointвҶ’plane: |axвӮҖ+byвӮҖ+czвӮҖвҲ’d|/вҲҡ(aВІ+bВІ+cВІ)"}],problems:[{q:"вҹЁ1,2,3вҹ©В·вҹЁ4,вҲ’1,2вҹ©=?",a:"8",sol:"4вҲ’2+6=8.",h:"Multiply+add."},{q:"|вҹЁ3,4вҹ©|=?",a:"5",sol:"вҲҡ25=5.",h:"вҲҡ(aВІ+bВІ)."},{q:"Plane thru (1,2,3) normal вҹЁ1,1,1вҹ©?",a:"x+y+z=6",sol:"1+2+3=6.",h:"Plane formula."},{q:"вҹЁ1,0,0вҹ©Г—вҹЁ0,1,0вҹ©=?",a:"вҹЁ0,0,1вҹ©",sol:"iГ—j=k.",h:"Cross product."}]},{title:"Partial Derivatives & Gradients",sections:[{h:"Partial Derivatives",body:"вҲӮf/вҲӮx: treat y as constant.\nf=xВІy+3xyВІвҲ’y: fвӮ“=2xy+3yВІ, fбө§=xВІ+6xyвҲ’1\n\nClairaut: fвӮ“бө§=fбө§вӮ“ (if continuous)."},{h:"Gradient",body:"вҲҮf=вҹЁвҲӮf/вҲӮx,вҲӮf/вҲӮyвҹ©\nвҖў Steepest increase direction\nвҖў |вҲҮf|=max rate of change\nвҖў вҠҘ to level curves\n\nDirectional: D_uf=вҲҮfВ·u"},{h:"Optimization",body:"Critical: вҲҮf=0.\nD=fвӮ“вӮ“fбө§бө§вҲ’(fвӮ“бө§)ВІ\n  D>0,fвӮ“вӮ“>0вҶ’min. D>0,fвӮ“вӮ“<0вҶ’max. D<0вҶ’saddle.\n\nLagrange: вҲҮf=О»вҲҮg, g=c."}],problems:[{q:"f=xВі+2xyвҲ’yВІ. fвӮ“=?",a:"3xВІ+2y",sol:"Treat y const.",h:"вҲӮ/вҲӮx."},{q:"вҲҮf at(1,2) for f=xВІyВі?",a:"вҹЁ16, 12вҹ©",sol:"fвӮ“=2xyВі=16, fбө§=3xВІyВІ=12.",h:"Both partials."},{q:"Critical pts of xВІ+yВІвҲ’4xвҲ’6y?",a:"(2, 3)",sol:"fвӮ“=2xвҲ’4=0, fбө§=2yвҲ’6=0.",h:"Set вҲӮf=0."},{q:"Classify xВІвҲ’yВІ at (0,0)?",a:"saddle point",sol:"D=(2)(вҲ’2)вҲ’0=вҲ’4<0.",h:"D<0вҶ’saddle."}]},{title:"Multiple Integrals",sections:[{h:"Double Integrals",body:"вҲ«вӮҖВ№вҲ«вӮҖВІ(x+y)dydx\n  Inner: 2x+2. Outer: 3.\n\nFubini: order doesn't matter."},{h:"Polar/Cylindrical/Spherical",body:"Polar: dA=r dr dОё\nCylindrical: dV=r dz dr dОё\nSpherical: dV=ПҒВІsinПҶ dПҒ dПҶ dОё\n\nSphere vol: 4ПҖRВі/3"},{h:"Triple Integrals",body:"вҲӯfdV. Choose coordinates wisely.\nJacobian for variable changes."}],problems:[{q:"вҲ«вӮҖВ№вҲ«вӮҖВ№(x+y)dydx=?",a:"1",sol:"Inner:x+ВҪ. Outer:1.",h:"y first."},{q:"(1,1) in polar?",a:"(вҲҡ2, ПҖ/4)",sol:"r=вҲҡ2, Оё=ПҖ/4.",h:"r=вҲҡ(xВІ+yВІ)."},{q:"вҲ¬1 dA over xВІ+yВІвүӨ4?",a:"4ПҖ",sol:"Polar: 4ПҖ.",h:"CircleвҶ’polar."}]},{title:"Vector Calculus",sections:[{h:"Line Integrals",body:"вҲ«_CFВ·dr=вҲ«F(r(t))В·r'(t)dt = work.\n\nConservative: F=вҲҮfвҶ’path independent.\nTest: вҲӮP/вҲӮy=вҲӮQ/вҲӮx."},{h:"Green's Theorem",body:"вҲ®(Pdx+Qdy)=вҲ¬(вҲӮQ/вҲӮxвҲ’вҲӮP/вҲӮy)dA\n\nLine integral = double integral inside."},{h:"Divergence & Curl",body:"div F=вҲҮВ·F=вҲӮP/вҲӮx+вҲӮQ/вҲӮy+вҲӮR/вҲӮz\ncurl F=вҲҮГ—F. curl=0вҶ”conservative.\n\nStokes: вҲ®FВ·dr=вҲ¬(curlF)В·dS\nDivergence: вҲҜFВ·dS=вҲӯ(divF)dV\n\nAll say: boundary = interior of derivative."}],problems:[{q:"F=вҹЁ2xy,xВІвҹ© conservative?",a:"yes",sol:"вҲӮP/вҲӮy=2x=вҲӮQ/вҲӮx.",h:"Check partials."},{q:"divF for вҹЁxВІ,xy,zВівҹ©?",a:"2x+x+3zВІ",sol:"Sum of вҲӮ/вҲӮ each.",h:"вҲӮP/вҲӮx+вҲӮQ/вҲӮy+вҲӮR/вҲӮz."},{q:"вҲҮf=вҹЁ2x,2yвҹ©. f=?",a:"xВІ+yВІ+C",sol:"Integrate, match.",h:"вҲ«Pdx then check Q."},{q:"Green's: вҲ®(ydxвҲ’xdy) on xВІ+yВІ=4?",a:"-8ПҖ",sol:"вҲ¬(вҲ’2)dA=вҲ’8ПҖ.",h:"вҲ¬(QвӮ“вҲ’Pбө§)dA."}]}]}];
