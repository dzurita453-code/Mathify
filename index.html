var COURSES=[{id:"alg1",title:"Algebra I",sub:"Foundations",color:"#e07a2f",icon:"x",desc:"Variables, equations, functions",lessons:[{title:"Linear Equations & Inequalities",sections:[{h:"Solving Linear Equations",body:"A linear equation has x to the first power. Goal: isolate x.\n\n  3x + 7 = 22 → 3x = 15 → x = 5\n\nVariables on both sides:\n  5x − 3 = 2x + 9 → 3x = 12 → x = 4\n\nDistribute first:\n  2(3x−1)−4 = 3(x+2) → 6x−6 = 3x+6 → x = 4\n\nAlways verify in the ORIGINAL equation."},{h:"Inequalities",body:"Same as equations EXCEPT:\n⚠️ Multiply/divide by NEGATIVE → FLIP the sign.\n\n  −2x > 6 → x < −3\n\nCompound: −1 < 2x+3 ≤ 9 → −2 < x ≤ 3\nInterval notation: (−2, 3]"},{h:"Absolute Value",body:"|x| = distance from 0.\n\n|expr| = k (k>0): expr = k OR expr = −k\n\n|2x−3| = 7 → x=5 or x=−2\n\n|x| < 3 → −3 < x < 3\n|x| > 3 → x<−3 or x>3"}],problems:[{q:"Solve: 4(x−3)+2 = 3x+5",a:"15",sol:"4x−10=3x+5 → x=15.",h:"Distribute first."},{q:"Solve: −3x+7 > 19",a:"x < -4",sol:"−3x>12 → x<−4.",h:"Flip when ÷ negative."},{q:"Solve: |3x−6| = 12",a:"6 and -2",sol:"3x−6=12→x=6. 3x−6=−12→x=−2.",h:"Two cases."},{q:"Three consecutive integers sum to 72. Largest?",a:"25",sol:"n+n+1+n+2=72→n=23. Largest=25.",h:"Let n, n+1, n+2."}]},{title:"Quadratic Equations",sections:[{h:"Factoring",body:"ax²+bx+c=0. Factor then zero product property.\n  x²−5x+6=0 → (x−2)(x−3)=0 → x=2,3\n  x²−16=0 → (x−4)(x+4)=0 → x=±4"},{h:"Quadratic Formula",body:"x = (−b ± √(b²−4ac))/(2a)\n\nDiscriminant Δ=b²−4ac:\n  Δ>0: two real solutions\n  Δ=0: one repeated\n  Δ<0: no real (complex)\n\n2x²−3x−5=0: x=(3±7)/4 → 5/2 or −1"},{h:"Completing the Square",body:"x²+6x+2=0 → (x+3)²=7 → x=−3±√7\n\nVertex: x=−b/(2a), plug back for y."}],problems:[{q:"x²−9x+20=0",a:"4 and 5",sol:"(x−4)(x−5)=0.",h:"Multiply 20, add 9."},{q:"2x²+x−6=0, positive root?",a:"3/2",sol:"(−1+7)/4=3/2.",h:"Quadratic formula."},{q:"Vertex of y=x²−4x+7?",a:"(2, 3)",sol:"x=2, y=3.",h:"x=−b/(2a)."},{q:"Real solutions of 3x²−2x+5=0?",a:"0",sol:"Δ=4−60<0.",h:"Discriminant."}]},{title:"Polynomials & Factoring",sections:[{h:"Operations",body:"(2x+3)(x−4) = 2x²−5x−12\n\nSpecial: (a+b)²=a²+2ab+b², (a−b)(a+b)=a²−b²"},{h:"Factoring",body:"Order: 1)GCF 2)Diff of squares 3)Trinomial 4)AC method 5)Grouping 6)Cubes\n\na³+b³=(a+b)(a²−ab+b²) SOAP: Same,Opposite,Always Positive"},{h:"Division",body:"Synthetic division for ÷(x−c).\nRemainder Theorem: f(c)=remainder.\nFactor Theorem: f(c)=0 ↔ (x−c) is factor."}],problems:[{q:"Factor: 2x³−18x",a:"2x(x-3)(x+3)",sol:"2x(x²−9)=2x(x−3)(x+3).",h:"GCF then diff squares."},{q:"Factor: 3x²+11x+6",a:"(3x+2)(x+3)",sol:"AC=18, split.",h:"AC method."},{q:"Factor: x³+8",a:"(x+2)(x²-2x+4)",sol:"Sum of cubes.",h:"a³+b³ formula."}]},{title:"Systems of Equations",sections:[{h:"Substitution",body:"Solve one for a variable, plug in.\n  y=2x+1, 3x+y=11 → x=2, y=5"},{h:"Elimination",body:"Add/subtract to eliminate.\n  2x+3y=12, 4x−3y=6 → 6x=18 → x=3,y=2"}],problems:[{q:"x+y=10, x−y=4. x=?",a:"7",sol:"Add: 2x=14.",h:"Add equations."},{q:"y=x², y=x+2. Positive x?",a:"2",sol:"x²=x+2→(x−2)(x+1)=0.",h:"Set equal."}]},{title:"Radicals & Rationals",sections:[{h:"Radicals",body:"√(ab)=√a·√b. √50=5√2.\nRationalize: 1/√3=√3/3."},{h:"Rationals",body:"Factor and cancel. Add: find LCD.\nSolve: ×LCD, CHECK extraneous solutions!"}],problems:[{q:"√(200)=?",a:"10√2",sol:"√(100·2)=10√2.",h:"Largest perfect square."},{q:"(x²−9)/(x²+5x+6)=?",a:"(x-3)/(x+2)",sol:"Factor both.",h:"Factor."}]}]},{id:"alg2",title:"Algebra II",sub:"& Precalculus",color:"#8338ec",icon:"f(x)",desc:"Functions, logs, complex numbers",lessons:[{title:"Functions",sections:[{h:"Fundamentals",body:"One output per input.\nDomain: denom≠0, radicand≥0, log arg>0."},{h:"Composition & Inverses",body:"(f∘g)(x)=f(g(x)). Order matters!\nInverse: swap x,y, solve. Verify: f(f⁻¹(x))=x."},{h:"Transformations",body:"y=f(x)+k: up. y=f(x−h): right.\ny=af(x): stretch. y=−f(x): flip."}],problems:[{q:"f(x)=x²−1. f(f(2))=?",a:"8",sol:"f(2)=3, f(3)=8.",h:"Inside-out."},{q:"f(x)=3x+2. f⁻¹(x)=?",a:"(x-2)/3",sol:"Swap and solve.",h:"y=3x+2→x=(y−2)/3."},{q:"Domain of √(5−2x)?",a:"x ≤ 5/2",sol:"5−2x≥0.",h:"Radicand≥0."}]},{title:"Exponentials & Logarithms",sections:[{h:"Exponentials",body:"a⁰=1, aˣaʸ=aˣ⁺ʸ, (aˣ)ʸ=aˣʸ\ne≈2.718. Growth: A=Peʳᵗ."},{h:"Logarithms",body:"log_a(x)=y means aʸ=x.\nlog(AB)=logA+logB, log(Aⁿ)=nlogA\nChange base: log_a(x)=ln(x)/ln(a)"},{h:"Solving",body:"Exponential→take log. Log→exponential.\n⚠️ Check log arguments > 0!"}],problems:[{q:"2ˣ=64. x=?",a:"6",sol:"2⁶=64.",h:"64 as power of 2."},{q:"log₃(27)+log₃(9)=?",a:"5",sol:"3+2=5.",h:"27=3³,9=3²."},{q:"log₂(x)+log₂(x+6)=4",a:"2",sol:"x²+6x=16→x=2.",h:"Combine, convert."},{q:"e^(2x)=7. x=?",a:"ln(7)/2",sol:"2x=ln7.",h:"Take ln."}]},{title:"Complex Numbers",sections:[{h:"Basics",body:"i=√(−1), i²=−1. (3+2i)(1−4i)=11−10i\ni powers: i,−1,−i,1,… cycle of 4."}],problems:[{q:"(2+3i)(4−i)=?",a:"11+10i",sol:"8−2i+12i−3i²=11+10i.",h:"FOIL, i²=−1."},{q:"i⁴⁷=?",a:"-i",sol:"47mod4=3, i³=−i.",h:"Cycle of 4."}]},{title:"Sequences & Series",sections:[{h:"Arithmetic",body:"aₙ=a₁+(n−1)d. Sₙ=n(a₁+aₙ)/2."},{h:"Geometric",body:"aₙ=a₁rⁿ⁻¹. S∞=a₁/(1−r) if |r|<1."}],problems:[{q:"a₁=5,d=3. a₅₀=?",a:"152",sol:"5+49(3)=152.",h:"Formula."},{q:"8+4+2+1+…=?",a:"16",sol:"8/(1−1/2)=16.",h:"Infinite geo."},{q:"Sum 1 to 100?",a:"5050",sol:"100(101)/2.",h:"n(n+1)/2."}]}]},{id:"trig",title:"Trigonometry",sub:"Angles & Waves",color:"#2a9d8f",icon:"θ",desc:"Angles, ratios, circular motion",lessons:[{title:"Trig Functions & Unit Circle",sections:[{h:"SOH-CAH-TOA",body:"sin=O/H, cos=A/H, tan=O/A\n45-45-90: 1,1,√2. 30-60-90: 1,√3,2."},{h:"Unit Circle",body:"(cosθ,sinθ) on unit circle.\n0°:0,1  30°:½,√3/2  45°:√2/2,√2/2  60°:√3/2,½  90°:1,0\nQ1:all+ Q2:sin+ Q3:tan+ Q4:cos+"},{h:"Identities",body:"sin²+cos²=1. sin2θ=2sinθcosθ.\ncos2θ=cos²−sin². Sum formulas exist."}],problems:[{q:"sin(5π/6)=?",a:"1/2",sol:"Q2, ref π/6.",h:"Reference angle."},{q:"sinθ=3/5 Q1. cosθ=?",a:"4/5",sol:"cos²=16/25.",h:"sin²+cos²=1."},{q:"cos(75°) exact?",a:"(√6-√2)/4",sol:"cos(45+30).",h:"Sum formula."}]},{title:"Graphing & Inverses",sections:[{h:"Graphing",body:"y=Asin(Bx−C)+D. Amp=|A|, Period=2π/|B|."},{h:"Inverse Trig",body:"arcsin:[−1,1]→[−π/2,π/2]\narctan:ℝ→(−π/2,π/2)"}],problems:[{q:"Period of sin(3x)?",a:"2π/3",sol:"2π/3.",h:"2π/B."},{q:"arctan(√3)=?",a:"π/3",sol:"tan(π/3)=√3.",h:"Which angle?"}]},{title:"Trig Equations",sections:[{h:"Solving",body:"sinx=½ in [0,2π): x=π/6, 5π/6.\nUse identities to simplify first.\n⚠️ Never divide by trig function!"}],problems:[{q:"cosx=−½ in [0,2π)?",a:"2π/3 and 4π/3",sol:"Ref π/3, Q2+Q3.",h:"cos neg Q2,Q3."},{q:"2sin²x=1 in [0,2π)?",a:"π/4, 3π/4, 5π/4, 7π/4",sol:"sinx=±√2/2.",h:"Isolate sin²."}]},{title:"Law of Sines & Cosines",sections:[{h:"Law of Sines",body:"a/sinA=b/sinB=c/sinC=2R."},{h:"Law of Cosines",body:"c²=a²+b²−2abcosC."}],problems:[{q:"A=30°,a=5,b=8. sinB=?",a:"4/5",sol:"8sin30°/5=4/5.",h:"Law of Sines."},{q:"Sides 3,4,5. Angle opp 5?",a:"90°",sol:"cosC=0.",h:"Law of Cosines."}]}]},{id:"calc1",title:"Calculus I",sub:"Limits & Derivatives",color:"#c25454",icon:"f'",desc:"Mathematics of change and motion",lessons:[{title:"Limits",sections:[{h:"Evaluating Limits",body:"lim[x→a]f(x)=L. Strategy:\n1)Plug in 2)If 0/0: factor 3)Rationalize 4)L'Hôpital\n\nlim[x→3](x²−9)/(x−3)=x+3→6"},{h:"Special Limits",body:"sin(x)/x→1, (eˣ−1)/x→1, (1+1/n)ⁿ→e\nAt ∞: divide by highest power.\nContinuity: f(a) exists, lim exists, equal."}],problems:[{q:"lim[x→2](x²−4)/(x−2)=?",a:"4",sol:"(x+2)→4.",h:"Factor."},{q:"lim[x→∞](5x³−2x)/(3x³+1)=?",a:"5/3",sol:"÷x³.",h:"Highest power."},{q:"lim[x→0]sin(5x)/x=?",a:"5",sol:"5·sin(5x)/(5x)→5.",h:"Rewrite."},{q:"lim[x→0](eˣ−1)/(2x)=?",a:"1/2",sol:"½·1=½.",h:"Special limit."}]},{title:"Derivative Rules",sections:[{h:"Power Rule & Basics",body:"d/dx[xⁿ]=nxⁿ⁻¹\neˣ→eˣ, lnx→1/x, sinx→cosx, cosx→−sinx"},{h:"Product/Quotient/Chain",body:"(fg)'=f'g+fg'. (f/g)'=(f'g−fg')/g².\nChain: [f(g(x))]'=f'(g(x))·g'(x)\n  sin(3x)→3cos(3x), e^(x²)→2xe^(x²)"},{h:"Implicit",body:"Diff both sides w.r.t. x.\nx²+y²=25→2x+2yy'=0→y'=−x/y"}],problems:[{q:"d/dx[3x⁴−2x²+7]=?",a:"12x³ - 4x",sol:"Power rule.",h:"nxⁿ⁻¹."},{q:"d/dx[x²eˣ]=?",a:"eˣ(x² + 2x)",sol:"Product.",h:"f'g+fg'."},{q:"d/dx[sin(x³)]=?",a:"3x²cos(x³)",sol:"Chain.",h:"Outside'×inside'."},{q:"d/dx[ln(x²+1)]=?",a:"2x/(x²+1)",sol:"Chain+ln.",h:"1/u·u'."},{q:"x²+y²=25 at (3,4). dy/dx=?",a:"-3/4",sol:"y'=−x/y.",h:"Implicit."}]},{title:"Applications",sections:[{h:"Tangent Lines",body:"y−f(a)=f'(a)(x−a).\nApprox: f(a+Δx)≈f(a)+f'(a)Δx."},{h:"Optimization",body:"f'=0→critical pts. f''>0→min, <0→max.\nMax rect area, P=20: A=l(10−l)→l=5, A=25."},{h:"Related Rates",body:"Relate quantities, diff w.r.t. t, solve.\nLadder: x²+y²=25, dy/dt=−3/2."},{h:"L'Hôpital",body:"0/0 or ∞/∞: lim f/g=lim f'/g'.\nCurve sketch: domain→f'→f''→asymptotes."}],problems:[{q:"Tangent to x² at x=3. y-intercept?",a:"-9",sol:"y=6x−9.",h:"Slope=6."},{q:"f=x³−3x. Local max value?",a:"2",sol:"f'=0→x=±1. f(−1)=2.",h:"2nd deriv test."},{q:"lim[x→0](eˣ−1−x)/x²?",a:"1/2",sol:"L'Hôpital twice.",h:"Apply twice."},{q:"dA/dt=3, r=2. dr/dt=?",a:"3/(4π)",sol:"dA/dt=2πr·dr/dt.",h:"A=πr²."}]}]},{id:"calc2",title:"Calculus II",sub:"Integration & Series",color:"#5a5aa0",icon:"∫",desc:"Accumulation, volumes, infinite sums",lessons:[{title:"Integrals",sections:[{h:"Antiderivatives",body:"∫xⁿ=xⁿ⁺¹/(n+1)+C. ∫eˣ=eˣ+C.\n∫sinx=−cosx+C. ∫1/x=ln|x|+C."},{h:"FTC",body:"∫ₐᵇf(x)dx=F(b)−F(a).\n∫₁³x²dx=[x³/3]₁³=26/3."},{h:"Area",body:"Between curves: ∫[top−bottom]dx.\ny=x,y=x² on [0,1]: ∫(x−x²)=1/6."}],problems:[{q:"∫(3x²+2x)dx=?",a:"x³ + x² + C",sol:"Reverse power rule.",h:"Each term."},{q:"∫₀²4xdx=?",a:"8",sol:"[2x²]₀²=8.",h:"Antideriv: 2x²."},{q:"Area y=x,y=x² on [0,1]?",a:"1/6",sol:"∫(x−x²)=1/6.",h:"Top−bottom."}]},{title:"Techniques",sections:[{h:"u-Substitution",body:"∫2xcos(x²)dx: u=x²→sin(x²)+C."},{h:"By Parts",body:"∫udv=uv−∫vdu. LIATE.\n∫xeˣ=xeˣ−eˣ+C."},{h:"Partial Fractions",body:"Decompose rational functions.\n1/(x²−1)=1/(2(x−1))−1/(2(x+1))."}],problems:[{q:"∫2xsin(x²)dx=?",a:"-cos(x²) + C",sol:"u=x².",h:"u-sub."},{q:"∫xcosxdx=?",a:"x·sin x + cos x + C",sol:"Parts.",h:"u=x."},{q:"∫₀¹xeˣdx=?",a:"1",sol:"[xeˣ−eˣ]₀¹=1.",h:"Parts."}]},{title:"Volumes & Improper",sections:[{h:"Volumes",body:"Disk: π∫[f(x)]²dx. Shell: 2π∫xf(x)dx."},{h:"Improper",body:"∫₁∞1/x²dx=1 (converges). ∫₁∞1/xdx=∞ (diverges)."}],problems:[{q:"Volume y=x² [0,2] around x-axis?",a:"32π/5",sol:"π∫x⁴dx.",h:"Disk."},{q:"∫₁∞1/x³dx=?",a:"1/2",sol:"[−1/(2x²)]₁∞=½.",h:"p=3>1."}]},{title:"Series",sections:[{h:"Tests",body:"Divergence: limaₙ≠0→diverges.\np-series: Σ1/nᵖ, p>1→converges.\nGeo: |r|<1→a/(1−r). Ratio test."},{h:"Taylor",body:"eˣ=1+x+x²/2!+…\nsinx=x−x³/3!+…\ncosx=1−x²/2!+…\n1/(1−x)=1+x+x²+…"}],problems:[{q:"Σ1/n³ converge?",a:"converge",sol:"p=3>1.",h:"p-test."},{q:"Σ(1/3)ⁿ=?",a:"3/2",sol:"1/(1−1/3).",h:"Geometric."},{q:"Radius of Σxⁿ/n!?",a:"∞",sol:"Ratio→0.",h:"Ratio test."}]}]},{id:"calc3",title:"Calculus III",sub:"Multivariable",color:"#0096c7",icon:"∇",desc:"3D calculus, vector fields, big theorems",lessons:[{title:"Vectors & 3D",sections:[{h:"Vectors",body:"Dot: v·w=Σaᵢbᵢ=|v||w|cosθ. Scalar. ⊥ if 0.\nCross: v×w=vector ⊥ both. |v×w|=|v||w|sinθ."},{h:"Lines & Planes",body:"Line: r(t)=P₀+tv.\nPlane: a(x−x₀)+b(y−y₀)+c(z−z₀)=0."}],problems:[{q:"⟨1,2,3⟩·⟨4,−1,2⟩=?",a:"8",sol:"4−2+6=8.",h:"Multiply+add."},{q:"|⟨3,4⟩|=?",a:"5",sol:"√25.",h:"√(a²+b²)."},{q:"Plane thru (1,2,3) normal ⟨1,1,1⟩?",a:"x+y+z=6",sol:"1+2+3=6.",h:"Formula."},{q:"⟨1,0,0⟩×⟨0,1,0⟩=?",a:"⟨0,0,1⟩",sol:"i×j=k.",h:"Cross product."}]},{title:"Partial Derivatives",sections:[{h:"Partials",body:"∂f/∂x: treat y as constant.\nfₓᵧ=fᵧₓ (Clairaut's)."},{h:"Gradient",body:"∇f=⟨fₓ,fᵧ⟩. Points toward steepest increase.\n|∇f|=max rate. ⊥ level curves.\nD_uf=∇f·u."},{h:"Optimization",body:"∇f=0 for critical pts.\nD=fₓₓfᵧᵧ−fₓᵧ². D>0,fₓₓ>0→min. D<0→saddle.\nLagrange: ∇f=λ∇g, g=c."}],problems:[{q:"f=x³+2xy−y². fₓ=?",a:"3x²+2y",sol:"y constant.",h:"∂/∂x.
